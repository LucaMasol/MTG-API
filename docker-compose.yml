version: "3.9"

services:
  api:
    build: .
    container_name: mtg-meta-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: mtg-meta-db
    environment:
      POSTGRES_DB: mtgmeta
      POSTGRES_USER: mtguser
      POSTGRES_PASSWORD: mtgpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtguser -d mtgmeta"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: